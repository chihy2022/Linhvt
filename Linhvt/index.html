<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unime System | Unilever Dashboard</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- CSS CHÍNH PHẢI ĐẶT ĐÂY -->
    <link rel="stylesheet" href="assets/style.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
</head>
<body>
          <!-- LOGIN OVERLAY -->
    <div id="login-overlay" class="auth-overlay">
    <div class="login-box">
        <img src="assets/images/logoUNILEVER.png" alt="Unilever Logo">
        <h2 style="color: var(--primary); font-weight: 800;">Unime System</h2>
        <p>Vui lòng nhập User CODE để tiếp tục</p>
        
        <form id="loginForm" onsubmit="event.preventDefault();">
            <!-- Ô username ẩn này để trình duyệt không báo lỗi Accessibility -->
            <input type="text" name="username" style="display:none" autocomplete="username">
            
            <div class="password-container">
                <input type="password" id="login-uid" class="login-input" 
                       placeholder="USER CODE" 
                       autocomplete="current-password">
                <i class="fa-solid fa-eye-slash" id="togglePassword"></i>
            </div>
            
            <button type="submit" class="btn-login" id="btnLogin">ĐĂNG NHẬP</button>
        </form>
        
        <div id="login-msg" style="color: red; margin-top: 10px; font-size: 13px;"></div>
    </div>
</div>


    <!-- APP CONTAINER -->
    <div id="sidebar-overlay" class="sidebar-overlay"></div>
    <div class="app-container hidden">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="user-profile">
                    <div class="avatar"><img src="assets/images/logoUNILEVER.png" alt="Logo"></div>
                    <div class="user-info">
                        <span class="app-name">Unime System</span>
                        <span class="app-sub">DT Merchandising Channel</span>
                    </div>
                </div>
            </div>
            <nav class="sidebar-menu">
                <div class="menu-item hidden" data-shot="shot1" data-title="Báo cáo tiến độ">
                    <i class="fa-solid fa-table-columns"></i> <span>Báo cáo tiến độ</span>
                </div>
                <div class="menu-group hidden">
                    <div class="group-header">
                        <div class="header-main"><i class="fa-solid fa-diagram-project"></i><span>UMER Ecosystem</span></div>
                        <i class="fa-solid fa-chevron-down chevron"></i>
                    </div>
                    <div class="group-content">
                        <div class="menu-item sub-item hidden" data-shot="shot7" data-title="Mobile Dashboard"><span>Mobile Dashboard</span></div>
                        <div class="menu-item sub-item hidden" data-shot="shot5" data-title="POSM Inventory"><span>POSM Inventory</span></div>
                    </div>
                </div>
                <div class="menu-group">
                    <div class="group-header">
                        <div class="header-main"><i class="fa-solid fa-folder-tree"></i><span>Khác</span></div>
                        <i class="fa-solid fa-chevron-down chevron"></i>
                    </div>
                    <div class="group-content">
                        <div class="menu-item sub-item hidden" data-shot="shot8" data-title="Góc phản hồi"><span>Góc phản hồi</span></div>
                        <div class="menu-item sub-item hidden" data-shot="shot3" data-title="LINH TEST"><span>BA gantt...</span></div>
                    </div>
                </div>
            </nav>
            <div class="sidebar-footer">
                <div class="user-card" id="logoutBtn">
                    <div class="user-avatar-sm"><img src="assets/images/avtuser.png" alt="User Avatar"></div>
                    <div class="user-details"><span id="display-user-name">Loading...</span></div>
                    <i class="fa-solid fa-right-from-bracket"></i>
                </div>
            </div>
        </aside>

        <main class="main-content">
                <!-- Thêm lớp phủ mobile -->
                <div id="sidebar-overlay" class="sidebar-overlay"></div>

            <header class="main-header">
                <div class="header-left">
                    <button id="menuToggleBtn" class="btn-menu-global">
                        <i class="fa-solid fa-bars-staggered"></i>
                    </button>
                    <!-- Tên Shot nằm ngay cạnh nút Menu -->
                    <h5 id="dynamic-header-title"></h5>
                </div>
                
                <div class="header-actions">
                    <div id="shot-actions-slot"></div>
                    <button id="exportPdfBtn" class="btn-primary">
                        <i class="fa-solid fa-file-arrow-down"></i> <span>Xuất PDF</span>
                    </button>
                    <button id="exportPngBtn" class="btn-primary">
                        <i class="fa-solid fa-file-arrow-down"></i> <span>Xuất PNG</span>
                    </button>
                </div>
            </header>
            <!-- MÀN HÌNH CHỜ LOADING SIÊU CẤP -->
            <div id="page-loader" class="page-loader hidden">
                <div class="loader-content">
                    <div class="spinner-unime"></div>
                    <p>Đang tải dữ liệu...</p>
                </div>
            </div>

            <div id="content-area" class="content-body"></div>

            <div id="sidebar-overlay" class="sidebar-overlay"></div>

        </main>
    </div>

    <!-- MODAL ZOOM -->
    <div id="imageModal" class="modal-preview">
        <span class="close-modal">&times;</span>
        <img id="imgFull" class="modal-content">
    </div>

    <script src="assets/app.js"></script>
</body>
</html>
