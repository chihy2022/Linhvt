<div class="body-shot gantt-v35">
    <div class="gt-header-bar">
        <h2 class="shot-title">GANTT CHART PROJECT MANAGEMENT</h2>
        <div class="gt-actions">
            <button id="btnAddG" class="gt-btn gt-btn-add">+ Thêm dự án mới</button>
            <button id="btnSyncG" class="gt-btn gt-btn-sync">Sync GoogleSheets</button>
        </div>
    </div>

    <div class="gt-controls-bar">
    <div class="gt-filters">
        <label><input type="checkbox" id="fP" checked onchange="renderGanttV37()"> Project</label>
        <label><input type="checkbox" id="fT" checked onchange="renderGanttV37()"> Task</label>
        <label><input type="checkbox" id="fD" checked onchange="renderGanttV37()"> Detail</label>
    </div>
    <div class="gt-nav-month">
        <!-- Đổi tên hàm thành changeMonthV37 -->
        <button onclick="window.changeMonthV37(-1)" class="gt-btn-nav">&laquo; Pre</button>
        <span id="txtMonth" class="gt-month-label">Đang tải...</span>
        <button onclick="window.changeMonthV37(1)" class="gt-btn-nav">Next &raquo;</button>
    </div>
</div>

    <div class="gt-main-container">
        <!-- BẢNG TRÁI: DỮ LIỆU -->

        <div class="gt-side-left">
            <table class="gt-table-fixed">
                <!-- ĐÂY LÀ CHÌA KHÓA: Ép độ rộng từng cột từ đầu -->
                <colgroup>
                    <col style="width: 70px;text-align: right;"> <!-- DTL -->
                    <col style="width: 50px;text-align: right;"> <!-- TSK -->
                    <col style="width: 50px;text-align: right;"> <!-- ID -->
                    <col style="width: 300px;"> <!-- DESC -->
                    <col style="width: 70px;"> <!-- PIC -->
                    <col style="width: 90px;"> <!-- FROM -->
                    <col style="width: 90px;"> <!-- TO -->
                    <col style="width: 90px;"> <!-- STATUS -->
                    <col style="width: 80px;"> <!-- PRJ -->
                    <col style="width: 70px;"> <!-- GROUP -->
                    <col style="width: 80px;"> <!-- TEAM -->
                </colgroup>
                <thead>
                    <tr><th colspan="11" class="gt-super-head">THÔNG TIN CHI TIẾT DỰ ÁN</th></tr>
                    <tr>
                        <th>DTL</th><th>TSK</th><th>ID</th>
                        <th>MÔ TẢ CÔNG VIỆC</th>
                        <th>PIC</th><th>FROM</th><th>TO</th><th>STATUS</th>
                        <th>PRJ</th><th>GROUP</th><th>TEAM</th>
                    </tr>
                </thead>
                <tbody id="bodyLeft" style="font-size: 9px;"></tbody>
            </table>
        </div>

        <!-- BẢNG PHẢI: GANTT -->
        <div class="gt-side-right">
            <table class="gt-table-fixed">
                <thead id="headRight"></thead>
                <tbody id="bodyRight"></tbody>
            </table>
        </div>
    </div>
</div>
