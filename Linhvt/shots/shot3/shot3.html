<div class="body-shot gantt-v35">
    <div class="gt-header-bar">
        <h2 class="shot-title">GANTT CHART PROJECT MANAGEMENT (FULL SYNC)</h2>
        <div class="gt-actions">
            <button id="btnAddG" class="gt-btn gt-btn-add">+ THÊM DÒNG</button>
            <button id="btnSyncG" class="gt-btn gt-btn-sync">SYNC GOOGLE SHEETS</button>
        </div>
    </div>
    
    <div class="gt-controls-bar">
        <div class="gt-filters">
            <label><input type="checkbox" id="fP" checked onchange="renderGanttV35()"> Project</label>
            <label><input type="checkbox" id="fT" checked onchange="renderGanttV35()"> Task</label>
            <label><input type="checkbox" id="fD" checked onchange="renderGanttV35()"> Detail</label>
        </div>
        <div class="gt-nav-month">
            <button onclick="changeMonthV35(-1)" class="gt-btn-nav">&laquo; Lùi</button>
            <span id="txtMonth" class="gt-month-label">Đang tải...</span>
            <button onclick="changeMonthV35(1)" class="gt-btn-nav">Tới &raquo;</button>
        </div>
    </div>

    <div class="gt-main-container">
        <!-- BẢNG TRÁI: DỮ LIỆU -->
        <div class="gt-side-left">
            <table class="gt-table-fixed">
                <thead>
                    <tr><th colspan="11" class="gt-super-head">THÔNG TIN CHI TIẾT DỰ ÁN</th></tr>
                    <tr>
                        <th style="width:35px">DTL</th><th style="width:35px">TSK</th><th style="width:45px">ID</th>
                        <th class="col-desc-flex">MÔ TẢ CÔNG VIỆC</th><th style="width:65px">PIC</th>
                        <th style="width:85px">FROM</th><th style="width:85px">TO</th>
                        <th style="width:85px">STATUS</th><th style="width:80px">PRJ</th>
                        <th style="width:70px">GROUP</th><th style="width:80px">TEAM</th>
                    </tr>
                </thead>
                <tbody id="bodyLeft"></tbody>
            </table>
        </div>

        <!-- BẢNG PHẢI: GANTT -->
        <div class="gt-side-right">
            <table class="gt-table-fixed">
                <thead id="headRight"></thead>
                <tbody id="bodyRight"></tbody>
            </table>
        </div>
    </div>
</div>
